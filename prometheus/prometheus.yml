global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "smart-infra-monitoring-platform"

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager:9093 if you deploy Alertmanager

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "system-monitor"
    scrape_interval: 30s
    static_configs:
      - targets: ["exporter:9200"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "smart-infra-monitor"
