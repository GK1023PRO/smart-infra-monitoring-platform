# =============================================================
# Threshold Configuration - thresholds.conf
# Edit these values to tune alert sensitivity
# =============================================================

# CPU thresholds (%)
CPU_WARN=70
CPU_CRIT=90

# Memory thresholds (%)
MEM_WARN=75
MEM_CRIT=90

# Disk thresholds (%) - root partition
DISK_WARN=80
DISK_CRIT=90

# Load average (1-min) thresholds
LOAD_WARN=2.0
LOAD_CRIT=4.0

# Check interval in seconds
CHECK_INTERVAL=60
